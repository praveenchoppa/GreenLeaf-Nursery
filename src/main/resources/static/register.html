<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register - GreenLeaf Nursery</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        .auth-wrap{
            max-width:1150px;
            margin:0 auto;
            padding:18px;
        }

        .auth-card{
            max-width:520px;
            margin:40px auto;
            background:#fff;
            border:1px solid rgba(19,48,27,0.10);
            border-radius:22px;
            box-shadow:0 18px 40px rgba(19,48,27,0.10);
            padding:24px;
        }

        .field{
            display:grid;
            gap:6px;
            margin-top:14px;
        }

        input{
            width:100%;
            padding:12px 14px;
            border-radius:16px;
            border:1px solid rgba(19,48,27,0.10);
        }

        .msg{
            margin-top:12px;
            font-weight:700;
        }

        .success{
            color:green;
        }

        .error{
            color:red;
        }
    </style>
</head>
<body>

<header class="nav">
    <div class="nav-inner">

        <div class="brand"
             onclick="window.location.href='index.html'">

            <div class="logo">🌿</div>

            <div class="brand-text">
                <div class="brand-name">
                    GreenLeaf Nursery
                </div>

                <div class="brand-sub">
                    Register
                </div>
            </div>

        </div>

        <nav class="nav-links">
            <a href="index.html">
                Home
            </a>
        </nav>

    </div>
</header>

<div class="auth-wrap">

    <div class="auth-card">

        <h2>Create Account 🌿</h2>

        <div class="field">
            <label>Username</label>
            <input id="username">
        </div>

        <div class="field">
            <label>Email</label>
            <input id="email">
        </div>

        <div class="field">
            <label>Password</label>
            <input
                    id="password"
                    type="password">
        </div>

        <div style="margin-top:15px;">
            <button
                    class="btn btn-primary"
                    onclick="registerUser()">
                Register
            </button>
        </div>

        <div
                id="message"
                class="msg">
        </div>

        <div style="margin-top:15px;">
            Already have an account?
            <a href="login.html">
                Login
            </a>
        </div>

    </div>

</div>

<script src="js/register.js"></script>

</body>
</html>
