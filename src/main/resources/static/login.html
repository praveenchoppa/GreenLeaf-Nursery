<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GreenLeaf Nursery</title>


<link rel="stylesheet" href="css/style.css">

<style>
    .auth-wrap{
        max-width:1150px;
        margin:0 auto;
        padding:18px;
    }

    .auth-card{
        max-width:520px;
        margin:40px auto;
        background:#fff;
        border:1px solid rgba(19,48,27,0.10);
        border-radius:22px;
        box-shadow:0 18px 40px rgba(19,48,27,0.10);
        padding:24px;
    }

    .auth-title{
        margin:0;
        font-size:28px;
        font-weight:900;
    }

    .auth-sub{
        color:rgba(19,48,27,0.70);
        margin-top:6px;
    }

    .field{
        display:grid;
        gap:6px;
        margin-top:14px;
    }

    label{
        font-weight:800;
        font-size:13px;
    }

    input{
        width:100%;
        padding:12px 14px;
        border-radius:16px;
        border:1px solid rgba(19,48,27,0.10);
        outline:none;
        font-family:inherit;
    }

    .error{
        color:#c62828;
        margin-top:10px;
        font-weight:700;
    }

    .bottom{
        margin-top:18px;
        text-align:center;
    }

    .bottom a{
        color:#0b6e3a;
        font-weight:700;
        text-decoration:none;
    }
</style>


</head>
<body>

<header class="nav">
    <div class="nav-inner">

    <div class="brand"
         onclick="window.location.href='index.html'">

        <div class="logo">🌿</div>

        <div class="brand-text">
            <div class="brand-name">
                GreenLeaf Nursery
            </div>

            <div class="brand-sub">
                Login
            </div>
        </div>
    </div>

    <nav class="nav-links">
        <a href="index.html">
            Home
        </a>
    </nav>

</div>


</header>

<div class="auth-wrap">


<div class="auth-card">

    <h2 class="auth-title">
        Welcome Back 🌿
    </h2>

    <p class="auth-sub">
        Login to your account to enter the world of greenery and freshness.
    </p>

    <div class="field">
        <label>Username</label>
        <input
                id="username"
                placeholder="Enter username">
    </div>

    <div class="field">
        <label>Password</label>
        <input
                id="password"
                type="password"
                placeholder="Enter password">
    </div>

    <div style="margin-top:16px;">
        <button
                class="btn btn-primary"
                onclick="login()">
            Login
        </button>
    </div>

    <div
            id="error"
            class="error">
    </div>

    <div class="bottom">
        New user?
        <a href="register.html">
            Register here
        </a>
    </div>

</div>
```

</div>

<script src="js/login.js"></script>

</body>
</html>
