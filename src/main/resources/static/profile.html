<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Profile</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        .profile-wrap{
            max-width:1150px;
            margin:0 auto;
            padding:18px;
        }

        .profile-card{
            max-width:650px;
            margin:40px auto;
            background:#fff;
            border-radius:22px;
            border:1px solid rgba(19,48,27,0.10);
            box-shadow:0 18px 40px rgba(19,48,27,0.10);
            padding:24px;
        }

        .row{
            margin-top:14px;
        }

        .label{
            font-weight:800;
            font-size:13px;
        }

        .value{
            margin-top:4px;
            color:rgba(19,48,27,0.80);
        }
    </style>
</head>
<body>

<header class="nav">
    <div class="nav-inner">

        <div class="brand"
             onclick="window.location.href='index.html'">

            <div class="logo">🌿</div>

            <div class="brand-text">
                <div class="brand-name">
                    GreenLeaf Nursery
                </div>

                <div class="brand-sub">
                    Profile
                </div>
            </div>

        </div>

    </div>
</header>

<div class="profile-wrap">

    <div class="profile-card">

        <h2>👤 My Profile</h2>

        <div class="row">
            <div class="label">Username</div>
            <div id="username" class="value">
                Loading...
            </div>
        </div>

        <div class="row">
            <div class="label">Email</div>
            <div id="email" class="value">
                Loading...
            </div>
        </div>

        <div class="row">
            <div class="label">Role</div>
            <div id="role" class="value">
                Loading...
            </div>
        </div>

        <div style="margin-top:20px;">
            <button
                class="btn btn-primary"
                onclick="logout()">
                Logout
            </button>
        </div>

    </div>

</div>

<script src="js/profile.js"></script>

</body>
</html>
