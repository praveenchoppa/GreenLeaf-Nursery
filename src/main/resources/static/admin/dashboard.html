<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/style.css" />

  <style>
    .wrap{
      max-width: 1150px;
      margin: 0 auto;
      padding: 18px;
    }
    .dash{
      background: #fff;
      border: 1px solid rgba(19,48,27,0.10);
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(19,48,27,0.10);
      padding: 18px;
    }
    .dash-top{
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .dash-title{
      margin: 0;
      font-weight: 900;
      font-size: 22px;
    }
    .controls{
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .form-grid{
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .box{
      border: 1px solid rgba(19,48,27,0.10);
      border-radius: 20px;
      padding: 14px;
      background: rgba(19,48,27,0.02);
    }
    .box h3{ margin: 0 0 10px; }
    .field{
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }
    label{ font-weight: 800; font-size: 13px; }
    input, select, textarea{
      width: 100%;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(19,48,27,0.10);
      outline: none;
      font-weight: 600;
      font-family: inherit;
    }
    textarea{ min-height: 90px; resize: vertical; }

    .list{
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }
    .rowItem{
      background: #fff;
      border: 1px solid rgba(19,48,27,0.10);
      border-radius: 18px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .rowLeft{
      display: grid;
      gap: 2px;
    }
    .rowTitle{ font-weight: 900; }
    .rowSub{ font-size: 12px; color: rgba(19,48,27,0.65); font-weight: 600; }
    .rowActions{
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .upload-row{
      margin-top: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    @media(max-width: 900px){
      .form-grid{ grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="nav">
    <div class="nav-inner">
      <div class="brand" onclick="window.location.href='../index.html'">
        <div class="logo">🌿</div>
        <div class="brand-text">
          <div class="brand-name">GreenLeaf Nursery</div>
          <div class="brand-sub">Admin Dashboard</div>
        </div>
      </div>

      <nav class="nav-links">
        <a href="../index.html">View Website</a>
      </nav>

      <a class="nav-cta" href="#" onclick="logout()">Logout</a>
    </div>
  </header>

  <div class="wrap">
    <div class="dash">
      <div class="dash-top">
        <h2 class="dash-title">🛠 Admin Dashboard</h2>
        <div class="controls">
          <a class="btn btn-ghost" href="../index.html">Open Home</a>
        </div>
      </div>

      <p class="muted">
        ✅ Upload flower image directly from mobile and manage flowers easily.
      </p>

      <div class="form-grid">

        <!-- ✅ Category Box -->
        <div class="box">
          <h3>➕ Add Category</h3>

          <div class="field">
            <label>Category Name</label>
            <input id="catName" placeholder="Rose / Lily / Jasmine" />
          </div>

          <div style="margin-top:12px;">
            <button class="btn btn-primary" onclick="addCategory()">Add Category</button>
          </div>

          <div class="list" id="catList"></div>
        </div>

        <!-- ✅ Flower Box -->
        <div class="box">
          <h3>🌸 Add / Edit Flower</h3>

          <!-- Hidden field for edit -->
          <input id="editFlowerId" type="hidden" value="" />

          <div class="field">
            <label>Category</label>
            <select id="flowerCategory"></select>
          </div>

          <div class="field">
            <label>Flower Name</label>
            <input id="flowerName" placeholder="Red Rose" />
          </div>

          <div class="field">
            <label>Price (₹)</label>
            <input id="flowerPrice" type="number" placeholder="120" />
          </div>

          <div class="field">
            <label>Weight (kg)</label>
            <input id="flowerWeight" type="number" step="0.1" placeholder="1.5" />
          </div>

          <div class="field">
            <label>Pot Size</label>
            <input id="flowerPotSize" placeholder="2x2 / 4x4" />
          </div>

          <div class="field">
            <label>Description (optional)</label>
            <textarea id="flowerDesc" placeholder="Fresh plant..."></textarea>
          </div>

          <!-- ✅ Cloudinary Upload -->
          <div class="field">
            <label>Upload Flower Image (Mobile)</label>
            <input id="flowerImgFile" type="file" accept="image/*" />
          </div>

          <div class="upload-row">
            <button class="btn btn-ghost" onclick="uploadFlowerImage()">Upload Image</button>
            <span class="muted" style="font-size:12px;">(Upload first, then Add/Update flower)</span>
          </div>

          <div class="field">
            <label>Image URL (Auto After Upload)</label>
            <input id="flowerImgUrl" placeholder="Image URL will appear here" readonly />
          </div>

          <!-- Buttons -->
          <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
            <button id="addBtn" class="btn btn-primary" onclick="addFlower()">Add Flower</button>
            <button id="updateBtn" class="btn btn-ghost" onclick="updateFlower()" style="display:none;">Update Flower</button>
            <button id="cancelEditBtn" class="btn btn-ghost" onclick="cancelEdit()" style="display:none;">Cancel Edit</button>
          </div>

          <div class="list" id="flowerList"></div>
        </div>

      </div>

    </div>
  </div>

  <script src="../js/admin-dashboard.js"></script>
</body>
</html>
