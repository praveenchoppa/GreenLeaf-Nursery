<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - GreenLeaf Nursery</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/style.css" />

  <style>
    .login-wrap{
      max-width: 1150px;
      margin: 0 auto;
      padding: 18px;
    }
    .login-card{
      max-width: 520px;
      margin: 25px auto;
      background: #fff;
      border: 1px solid rgba(19,48,27,0.10);
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(19,48,27,0.10);
      padding: 18px;
    }
    .login-title{
      font-weight: 900;
      margin: 0 0 6px;
      font-size: 22px;
    }
    .login-sub{
      margin: 0 0 14px;
      color: rgba(19,48,27,0.70);
      font-weight: 600;
      font-size: 13px;
    }
    .field{
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }
    label{ font-weight: 800; font-size: 13px; }
    input{
      width: 100%;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(19,48,27,0.10);
      outline: none;
      font-weight: 600;
    }
    .msg{
      margin-top: 10px;
      font-weight: 700;
      font-size: 13px;
      color: #b00020;
      display: none;
    }
    .row{
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .tiny{
      color: rgba(19,48,27,0.65);
      font-weight: 600;
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <header class="nav">
    <div class="nav-inner">
      <div class="brand" onclick="window.location.href='../index.html'">
        <div class="logo">🌿</div>
        <div class="brand-text">
          <div class="brand-name">GreenLeaf Nursery</div>
          <div class="brand-sub">Admin Panel</div>
        </div>
      </div>

      <nav class="nav-links">
        <a href="../index.html">Home</a>
      </nav>

      <a class="nav-cta" href="../index.html">Back</a>
    </div>
  </header>

  <div class="login-wrap">
    <div class="login-card">
      <h2 class="login-title">🔐 Admin Login</h2>
      <p class="login-sub">Login to manage categories and flowers.</p>

      <div class="field">
        <label>Username</label>
        <input id="username" placeholder="Enter admin username" />
      </div>

      <div class="field">
        <label>Password</label>
        <input id="password" type="password" placeholder="Enter admin password" />
      </div>

      <div id="errorMsg" class="msg">Invalid login</div>

      <div class="row">
        <button class="btn btn-primary" onclick="login()">Login</button>
        <button class="btn btn-ghost" onclick="window.location.href='../index.html'">Cancel</button>
      </div>

      <div class="tiny">
        Enter to the Plants World!!
      </div>
    </div>
  </div>

  <script src="../js/admin-login.js"></script>
</body>
</html>
